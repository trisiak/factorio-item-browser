name: CI
on:
  push:
  workflow_dispatch:

jobs:

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      # react-sortablejs@6 pins react@16 peers; the tree resolves fine with legacy semantics
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run jest
        run: npm run test-jest

  coding-guidelines:
    name: Coding Guidelines
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run eslint
        run: npm run test-eslint

  type-checker:
    name: Type Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tsc
        run: npm run test-tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # The production build reads ./.env (gitignored); the dev values are fine for a CI build.
      - name: Prepare env file
        run: cp .env.development .env

      - name: Build webpack
        run: npm run build

      - name: Upload build result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/**
